<!DOCTYPE html>
<!-- TD-markitdown Loading Page | TobonDigital.com -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TD-markitdown - TobonDigital</title>
    <link rel="icon" type="image/png" href="./logo_t.png">
    <link rel="icon" type="image/x-icon" href="./logo_t.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0e1a;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Animated background orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.12;
            animation: float 8s ease-in-out infinite;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: #2563EB;
            top: -100px; left: -100px;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: #1B365D;
            bottom: -80px; right: -80px;
            animation-delay: -3s;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: #3B82F6;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        .orb-3 {
            animation: float3 8s ease-in-out infinite;
            animation-delay: -5s;
        }
        @keyframes float3 {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50% { transform: translate(-50%, -50%) translateY(-20px); }
        }

        /* Main content */
        .splash-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-img {
            height: 56px;
            object-fit: contain;
            filter: drop-shadow(0 4px 24px rgba(37, 99, 235, 0.4));
        }

        .divider {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, transparent, #2563EB, transparent);
            margin: 0 auto;
        }

        .app-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-align: center;
        }

        .app-name span {
            color: #60A5FA;
        }

        /* Spinner */
        .spinner-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(37, 99, 235, 0.2);
            border-top-color: #2563EB;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
            min-height: 20px;
            text-align: center;
            transition: color 0.3s;
        }

        .status-text.ready {
            color: #34D399;
        }

        .status-text.error {
            color: #F87171;
        }

        /* Dots progress */
        .dots {
            display: inline-block;
            width: 24px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="splash-content">
        <img class="logo-img" src="./logo_text.png" alt="TobonDigital" onerror="this.style.display='none'">
        <div class="divider"></div>
        <div class="app-name">TD-<span>markitdown</span></div>
        <div class="spinner-wrap">
            <div class="spinner"></div>
            <div class="status-text" id="status">
                Starting application<span class="dots" id="dots">...</span>
            </div>
        </div>
    </div>

    <script>
        // Animated dots
        let dotCount = 0;
        const dotsEl = document.getElementById('dots');
        setInterval(() => {
            dotCount = (dotCount + 1) % 4;
            dotsEl.textContent = '.'.repeat(dotCount) || '';
        }, 400);

        // Poll the backend until ready, then redirect
        let attempts = 0;
        const MAX_ATTEMPTS = 600; // 5 min max (500ms intervals)

        async function checkServer() {
            attempts++;

            if (attempts > MAX_ATTEMPTS) {
                const statusEl = document.getElementById('status');
                statusEl.className = 'status-text error';
                dotsEl.textContent = '';
                statusEl.textContent = 'Error: Could not reach the server. Please restart the application.';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:8000/api/settings', {
                    cache: 'no-store',
                    signal: AbortSignal.timeout(2000)
                });
                if (response.ok) {
                    const statusEl = document.getElementById('status');
                    statusEl.className = 'status-text ready';
                    dotsEl.textContent = '';
                    statusEl.textContent = 'Ready! Launching...';
                    // Small delay so user can see "Ready" before navigating
                    setTimeout(() => {
                        window.location.replace('http://127.0.0.1:8000');
                    }, 200);
                    return;
                }
            } catch (e) {
                // Server not ready yet, keep trying
            }

            setTimeout(checkServer, 500);
        }

        // Start polling immediately
        checkServer();
    </script>
</body>
</html>
