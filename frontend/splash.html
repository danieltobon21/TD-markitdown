<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TD-markitdown</title>
    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Montserrat', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        .splash-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        .logo-img {
            height: 55px;
            object-fit: contain;
            animation: fadeIn 0.8s ease-out;
        }
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(27, 54, 93, 0.15);
            border-top-color: #2563EB; /* Tech Blue */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .loading-text {
            font-size: 0.85rem;
            color: #1B365D; /* Navy Blue */
            font-weight: 500;
            letter-spacing: 0.5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <img class="logo-img" src="logo_text.png" alt="TobonDigital">
        <div class="loader-container">
            <div class="spinner"></div>
            <div class="loading-text">Initializing system...</div>
        </div>
    </div>
</body>
</html>
